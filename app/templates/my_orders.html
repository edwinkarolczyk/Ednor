{% extends "layout.html" %}

{% block content %}
<section>
    <h1>Moje zlecenia</h1>
    <div class="mobile-list">
        {% for a in assignments %}
            <article class="card">
                <p><strong>#{{ a.order.order_no }}</strong> — {{ a.order.title }}</p>
                <p>Status: {{ a.order.status }}</p>
                <p>Rola: {{ a.role_code }}</p>
                <a class="btn" href="/orders/{{ a.order.id }}">Szczegóły</a>
            </article>
        {% else %}
            <article class="card"><p>Brak przypisanych zleceń.</p></article>
        {% endfor %}
    </div>
</section>
{% endblock %}
