{% extends "layout.html" %}

{% block content %}

<h2>Wyceny</h2>

<a href="/quotes/new">Nowa wycena</a>

<table>
    <tr>
        <th>ID</th>
        <th>Klient</th>
        <th>Status</th>
        <th></th>
    </tr>

    {% for q in quotes %}
    <tr>
        <td>{{ q.id }}</td>
        <td>{{ q.customer_name }}</td>
        <td>{{ q.status }}</td>
        <td><a href="/quotes/{{ q.id }}">Otwórz</a></td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
