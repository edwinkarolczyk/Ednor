{% extends "layout.html" %}

{% block content %}
<section class="card">
    <h1>Mój profil</h1>
    <p><strong>Login:</strong> {{ current_user.username }}</p>
    <p><strong>Imię i nazwisko:</strong> {{ current_user.full_name or '-' }}</p>
    <p><strong>Role:</strong>
        {% for role in current_user.roles %}
            <span class="badge">{{ role.name }}</span>
        {% endfor %}
    </p>
</section>
{% endblock %}
