{% extends "layout.html" %}

{% block content %}
<section class="card">
    <div class="row-between">
        <h1>Zlecenia</h1>
        <a class="btn" href="/orders/new">Dodaj zlecenie</a>
    </div>
    <table>
        <thead>
        <tr>
            <th>Nr</th>
            <th>Tytuł</th>
            <th>Klient</th>
            <th>Status</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        {% for order in orders %}
        <tr>
            <td>{{ order.order_no }}</td>
            <td>{{ order.title }}</td>
            <td>{{ order.client_name or '-' }}</td>
            <td>{{ order.status }}</td>
            <td><a href="/orders/{{ order.id }}">Szczegóły</a></td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</section>
{% endblock %}
